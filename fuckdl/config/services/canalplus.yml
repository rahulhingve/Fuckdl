# DO NOT EDIT THIS FILE (unless you're a developer).
# This is the default configuration for the service and is not meant to be modified by users.

endpoints:
  config:
    prod: https://player.canalplus.com/one/configs/v2/12/mycanal/prod.json

  token: https://pass-api-v2.canal-plus.com/provider/services/cpfra-fr/public/createToken
  metadata: https://secure-gen-spyro.canal-plus.com/spyro
  streams: https://secure-gen-hapi.canal-plus.com/conso/playset/unit/{title}
  view: https://secure-gen-hapi.canal-plus.com/conso/view
  series:
    fr: https://hodor.canalplus.pro/api/v2/mycanal/detail/{token}/okapi/{title}.json
    intl: https://hodor.canalplus.pro/api/v2/mycanalint/detail/{token}/okapi/{title}.json

titles_query: |
    query content($id: String!) {
      catalog {
        unit(id: $id) {
          id
          contentType
          objectType
          num
          duration
          productionNationalities {
            id
            codeISO2
            name
            __typename
          }
          productionYear
          morality
          parentalRatings {
            value
            authority
            __typename
          }
          titles {
            title
            originalTitle
            subtitle
            __typename
          }
          context_UNIT: context(type: unit) {
            titles {
              titleDivisible
              titleIndivisible
              subTitleDivisible
              subTitleIndivisible
              __typename
            }
            __typename
          }
          synopsis {
            large
            __typename
          }
          members {
            job {
              prefix
              __typename
            }
            __typename
          }
          reviews {
            partner {
              id
              name
              __typename
            }
            opinions {
              rating
              comment
              recommended
              __typename
            }
            __typename
          }
          availabilities {
            available {
              catchup {
                format {
                  language {
                    subtitle
                    __typename
                  }
                  __typename
                }
                __typename
              }
              tvod {
                format {
                  language {
                    subtitle
                    __typename
                  }
                  __typename
                }
                __typename
              }
              __typename
            }
            __typename
          }
          brand {
            id
            __typename
          }
          season {
            id
            __typename
          }
          pictures(types: ["STD169", "GEN169"]) {
            url
            format
            __typename
          }
          pictures34: pictures(types: ["JAQCANAL", "STD169", "GEN169"]) {
            url
            format
            __typename
          }
          channels {
            display {
              pictures(types: ["CHN43FN", "CHN43FB"]) {
                url
                format
                __typename
              }
              __typename
            }
            __typename
          }
          revisionEdito
          __typename
        }
        __typename
      }
    }
