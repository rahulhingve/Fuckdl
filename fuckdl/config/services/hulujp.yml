endpoints:
  # Cookie authentication endpoints
  cookies_token: "https://www.hulu.jp/api/user/token/refresh"
  cookies_user: "https://www.hulu.jp/api/user/sync"
  
  # Session endpoints
  create_session: "https://mapi.prod.hjholdings.tv/api/v1/sessions/create"
  
  # Authentication endpoints
  credentials_login: "https://mapi.prod.hjholdings.tv/api/v1/users/auth"
  auth_profile: "https://mapi.prod.hjholdings.tv/api/v1/gaia/auth/profile"
  
  # User endpoints
  user_info: "https://mapi.prod.hjholdings.tv/api/v1/sessions/get_user_info"
  user_profile: "https://mapi.prod.hjholdings.tv/api/v1/users/me"
  
  # Token endpoints
  token_check: "https://token.prod.hjholdings.tv/token/check"
  token_refresh: "https://token.prod.hjholdings.tv/token/refresh"
  
  # Metadata endpoints
  metas: "https://mapi.prod.hjholdings.tv/api/v1/metas/{id}"
  
  # Playback endpoints
  playback_auth: "https://papi.prod.hjholdings.tv/api/v1/playback/auth"
  playback_media: "https://playback.prod.hjholdings.tv/session/open/v1/merchants/{service_id}/medias/{video_id}"
  playback_close: "https://playback.prod.hjholdings.tv/session/close"

